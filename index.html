<!DOCTYPE html>
<html lTF-8">
    <meta nawidth=device-width, initial-scale=1.0">
    <title>LUKMAN XD V.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00d4ff;
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 2rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00d4ff, #ff00ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px #00d4ff); }
            to { filter: drop-shadow(0 0 30px #ff00ff); }
        }

        .server-info {
            color: #00d4ff;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Generator Card */
        .generator-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .generator-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0, 212, 255, 0.2);
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            color: #fff;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
        }

        .generate-btn:active {
            transform: translateY(-1px);
        }

        /* Result */
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 0, 255, 0.1));
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            display: none;
        }

        .dns-code {
            background: #000;
            padding: 1.5rem;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #00ff88;
            word-break: break-all;
            margin: 1rem 0;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 212, 255, 0.2);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .expired-info {
            color: #ff6b6b;
            font-weight: 600;
            text-align: center;
            margin-top: 1rem;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-buy {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: #fff;
        }

        .btn-buy:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-wa {
            background: linear-gradient(45deg, #25d366, #128c7e);
            color: #fff;
        }

        .btn-wa:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            margin-top: 3rem;
        }

        .author-section {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        .author-title {
            color: #ff00ff;
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(45deg, #ff00ff, #ff6b6b);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin: 0.5rem;
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 0, 255, 0.4);
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }
            .generator-card {
                padding: 1.5rem;
            }
            .action-buttons {
                flex-direction: column;
            }
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            text-align: center;
            font-weight: 600;
        }

        .status.success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .status.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation" id="particles"></div>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <i class="fas fa-network-wired"></i> LUKMAN XD
        </div>
        <div class="server-info">
            <i class="fas fa-server"></i> 
        </div>
    </div>

    <div class="container">
        <!-- Generator Card -->
        <div class="generator-card">
            <h2 class="card-title">
                <i class="fas fa-magic"></i>DNS BOT MOBILE LEGENDS 
            </h2>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user"></i> Nama Pengguna
                </label>
                <input type="text" class="form-input" id="username" placeholder="Masukkan nama Anda..." required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-calendar"></i> Durasi (Hari)
                </label>
                <select class="form-input" id="duration">
                    <option value="7">7 Hari - Gratis</option>
                    <option value="30">30 Hari - Rp 25.000</option>
                    <option value="90">90 Hari - Rp 65.000</option>
                    <option value="365">365 Hari - Rp 200.000</option>
                </select>
            </div>

            <button class="generate-btn" onclick="generateDNS()">
                <i class="fas fa-bolt"></i> GENERATE DNS
            </button>

            <!-- Result -->
            <div class="result" id="result">
                <div class="status success" id="status"></div>
                <div class="dns-code" id="dnsCode">
                    <button class="copy-btn" onclick="copyDNS()">
                        <i class="fas fa-copy"></i> Copy
                    </button>
                    <code id="generatedDNS"></code>
                </div>
                <div class="expired-info" id="expiredInfo"></div>
               

        <!-- Author Section -->
        <div class="author-section">
            <h3 class="author-title">
                <i class="fas fa-crown"></i> Author LUKMAN XD
            </h3>
            <p style="color: #fff; text-align: center; margin-bottom: 1.5rem;">
                Web Ini untuk mendapatkan musuh bot versi premium kalo sudah Xpred Bisa buy ke admin <br>
                <small></small>
            </p>
            <div style="text-align: center;">
                <a href="https://wa.me/6282324350163?text=Halo%20author%2C%20saya%20mau%20tanya%20tentang%20dns%20generator" 
                   class="contact-btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp Author
                </a>
                <a href="https://wa.me/6282324350163?text=Saya%20ingin%20order%20DNS%20Premium%20dari%20Admin" 
                   class="contact-btn" target="_blank">
                    <i class="fas fa-store"></i> Order ke Admin
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p></p>
    </div>

    <script>
        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Generate DNS
        function generateDNS() {
            const username = document.getElementById('username').value.trim();
            const duration = document.getElementById('duration').value;
            const result = document.getElementById('result');
            const status = document.getElementById('status');
            const dnsCode = document.getElementById('generatedDNS');
            const expiredInfo = document.getElementById('expiredInfo');

            if (!username) {
                status.textContent = '❌ Nama pengguna tidak boleh kosong!';
                status.className = 'status error';
                result.style.display = 'block';
                return;
            }

            // Simulate generation
            status.textContent = ' Generating DNS configuration...';
            status.className = 'status success';
            result.style.display = 'block';

            setTimeout(() => {
                const timestamp = new Date();
                const days = parseInt(duration);
                const expiryDate = new Date(timestamp.getTime() + days * 24 * 60 * 60 * 1000);
                
                const dnsConfig = `dns://sg7bot-net.vip:443/${btoa(username)}?exp=${expiryDate.getTime()}`;
                
                dnsCode.textContent = dnsConfig;
                expiredInfo.innerHTML = `
                    <i class="fas fa-clock"></i> 
                    Expired: ${expiryDate.toLocaleDateString('id-ID')} 
                    (${days} hari) | 
                    <strong>Status: ${days <= 7 ? 'TRIAL' : 'PREMIUM'}</strong>
                `;

                status.textContent = ' DNS berhasil digenerate!';
                status.className = 'status success';
            }, 1500);
        }

        // Copy DNS
        function copyDNS() {
            const dnsCode = document.getElementById('generatedDNS').textContent;
            navigator.clipboard.writeText(dnsCode).then(() => {
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.style.background = 'rgba(0, 255, 136, 0.3)';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                }, 2000);
            });
        }

        // Initialize
        createParticles();
        
        // Auto focus username
        document.getElementById('username').focus();
    </script>
</body>
</html>
